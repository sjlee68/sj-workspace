<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d9488">
<title>FIORESE 상품기획 워크스페이스</title>
<style>
  :root{
    --ink:#1a1d26; --ink-2:#5a6472; --ink-3:#98a1b0;
    --bg:#f4f5f8; --card:#fff; --line:#e6e8ee; --line-2:#eef0f4;
    --nav:#141a2e; --nav-2:#9aa4bd; --nav-hover:#1e2740; --nav-active:#2563eb;
    --blue:#2563eb; --blue-soft:#e8f0fe;
    --pink:#db2777; --pink-soft:#fce7f2;
    --brand:#2563eb; --brand-soft:#e8f0fe;
    --done:#16a34a; --done-soft:#dcfce7;
    --amber:#ca8a04; --amber-soft:#fef9c3;
    --rose:#e11d48; --rose-soft:#ffe4e9;
    --violet:#7c3aed; --violet-soft:#ede4fd;
    --gray-soft:#eceef2;
    --shadow:0 1px 2px rgba(26,29,38,.04),0 4px 16px rgba(26,29,38,.06);
    --shadow-lg:0 4px 24px rgba(26,29,38,.10);
    --sidebar-w:230px; --rail-w:296px; --header-h:56px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .num{font-variant-numeric:tabular-nums}
  .hide{display:none!important}

  /* ===== 앱 셸 ===== */
  .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}

  /* 사이드바 */
  .sidebar{background:var(--nav);color:#fff;position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
    display:flex;flex-direction:column;z-index:60;transition:transform .25s ease}
  .sb-brand{padding:18px 18px 14px;display:flex;align-items:center;gap:10px}
  .sb-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#0891b2);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
  .sb-brand .bt{font-size:14px;font-weight:800;letter-spacing:-.01em;line-height:1.2}
  .sb-brand .bs{font-size:10.5px;color:var(--nav-2);font-weight:600}
  .sb-nav{flex:1;overflow-y:auto;padding:6px 10px}
  .sb-group{font-size:10px;font-weight:700;color:#5a6484;letter-spacing:.06em;text-transform:uppercase;padding:12px 10px 6px}
  .sb-item{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;color:var(--nav-2);
    font-size:13px;font-weight:600;border:none;background:transparent;width:100%;text-align:left;transition:.12s}
  .sb-item:hover{background:var(--nav-hover);color:#e6e9f2}
  .sb-item.active{background:var(--nav-active);color:#fff;font-weight:700}
  .sb-item .ico{width:17px;height:17px;flex-shrink:0;stroke-width:2}
  .sb-item .cnt{margin-left:auto;font-size:10.5px;font-weight:700;background:rgba(255,255,255,.1);
    padding:1px 7px;border-radius:10px;color:var(--nav-2)}
  .sb-item.active .cnt{background:rgba(255,255,255,.22);color:#fff}
  .sb-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:#5a6484;line-height:1.5}

  /* 메인 컬럼 */
  .main{grid-column:2;display:flex;flex-direction:column;min-width:0}
  .header{height:var(--header-h);background:var(--card);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;padding:0 18px;position:sticky;top:0;z-index:50}
  .hamburger{display:none;width:34px;height:34px;border:none;background:transparent;border-radius:8px;
    align-items:center;justify-content:center}
  .hamburger:hover{background:var(--gray-soft)}
  .header .htitle{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .header .hspacer{margin-left:auto}
  .header .hicon{width:36px;height:36px;border:none;background:transparent;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--ink-2);position:relative}
  .header .hicon:hover{background:var(--gray-soft)}
  .header .hicon .ndot{position:absolute;top:7px;right:8px;width:8px;height:8px;background:var(--rose);border-radius:50%;border:1.5px solid var(--card)}
  .notif-panel{position:fixed;top:calc(var(--header-h) + 4px);right:14px;width:330px;max-width:calc(100vw - 28px);background:var(--card);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);z-index:80;overflow:hidden;display:none}
  .notif-panel.show{display:block;animation:fade .15s ease}
  .notif-h{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--line)}
  .notif-h .nt{font-size:13px;font-weight:800}
  .notif-h .nclear{font-size:11px;color:var(--ink-3);font-weight:700;border:none;background:transparent;cursor:pointer}
  .notif-h .nclear:hover{color:var(--rose)}
  .notif-list{max-height:60vh;overflow-y:auto}
  .notif-item{display:flex;gap:11px;padding:12px 15px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:.1s}
  .notif-item:last-child{border-bottom:none}
  .notif-item:hover{background:var(--bg)}
  .notif-item .ni-ic{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--blue-soft)}
  .notif-item .ni-body{flex:1;min-width:0}
  .notif-item .ni-t{font-size:12.5px;font-weight:700;line-height:1.35}
  .notif-item .ni-m{font-size:11px;color:var(--ink-2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .notif-item .ni-go{color:var(--ink-3);font-size:14px;flex-shrink:0;align-self:center}
  .notif-empty{padding:26px 15px;text-align:center;font-size:12px;color:var(--ink-3)}
  .header .hsearch{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg);
    border:1px solid var(--line);border-radius:9px;padding:7px 12px;width:230px;max-width:38vw}
  .header .hsearch input{border:none;background:transparent;outline:none;font-size:12.5px;width:100%;font-family:inherit;color:var(--ink)}
  .header .hicon{width:34px;height:34px;border:none;background:transparent;border-radius:8px;display:flex;
    align-items:center;justify-content:center;color:var(--ink-2);position:relative}
  .header .hicon:hover{background:var(--gray-soft)}
  .header .hicon .dot{position:absolute;top:7px;right:8px;width:7px;height:7px;background:var(--rose);border-radius:50%;border:1.5px solid var(--card)}
  .header .havatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--brand),#0891b2);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

  /* 콘텐츠 = 메인 본문 + 우측 레일 */
  .content{flex:1;display:grid;grid-template-columns:1fr var(--rail-w);gap:0;min-width:0}
  .content.no-rail{grid-template-columns:1fr}
  .panel-main{padding:20px 22px 48px;min-width:0}
  .rail{border-left:1px solid var(--line);background:var(--card);padding:18px 16px 40px;min-width:0}
  /* PC: 본문과 우측 레일 각각 독립 스크롤 */
  @media(min-width:1081px){
    .main{height:100vh;overflow:hidden}
    .content{flex:1;min-height:0;overflow:hidden}
    .panel-main{overflow-y:auto;height:100%}
    .rail{overflow-y:auto;height:100%}
  }

  section{display:none}
  section.active{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

  .page-h{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .page-h .pt{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .page-h .ps{font-size:12px;color:var(--ink-2);margin-top:3px;font-weight:500}
  .toggle{display:flex;background:var(--gray-soft);border-radius:9px;padding:2px}
  .toggle button{border:none;background:transparent;font-size:11.5px;font-weight:700;color:var(--ink-2);padding:6px 12px;border-radius:7px}
  .toggle button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}

  .banner{background:var(--amber-soft);color:#8a5a12;font-size:12px;font-weight:600;padding:10px 13px;border-radius:10px;margin-bottom:16px;line-height:1.5}
  .banner.secure{background:var(--rose-soft);color:#a01432}
  .banner.info{background:var(--blue-soft);color:#1d4ed8}

  /* ===== 요약 카드 (증감) ===== */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .kpi .kt{font-size:11.5px;color:var(--ink-2);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi .kt .kdot{width:7px;height:7px;border-radius:50%}
  .kpi .kn{font-size:27px;font-weight:800;letter-spacing:-.03em;margin-top:8px;line-height:1}
  .kpi .kd{font-size:11px;font-weight:700;margin-top:7px;display:inline-flex;align-items:center;gap:3px}
  .kpi .kd.up{color:var(--rose)} .kpi .kd.down{color:var(--done)} .kpi .kd.flat{color:var(--ink-3)}

  /* ===== 공통 카드/섹션 ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .block{margin-bottom:22px}
  .block-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .block-h .bt{font-size:13.5px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .block-h .bmore{font-size:11.5px;color:var(--ink-3);font-weight:700;border:none;background:transparent}
  .block-h .bmore:hover{color:var(--brand)}

  /* 리스트 행 */
  .lrow{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-2);cursor:pointer;transition:.1s}
  .lrow:last-child{border-bottom:none}
  .lrow:hover{background:var(--bg)}
  .lrow .lk{width:4px;height:32px;border-radius:3px;flex-shrink:0;background:var(--ink-3)}
  .lrow.p-rose .lk{background:var(--rose)} .lrow.p-amber .lk{background:var(--amber)}
  .lrow.p-blue .lk{background:var(--blue)} .lrow.p-violet .lk{background:var(--violet)}
  .lrow.p-brand .lk{background:var(--brand)} .lrow.p-pink .lk{background:var(--pink)}
  .lrow.p-done .lk{background:var(--done)}
  .lrow .lbody{flex:1;min-width:0}
  .lrow .ltitle{font-size:13px;font-weight:700;line-height:1.35}
  .lrow .lmeta{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .lrow .lgo{color:var(--ink-3);font-size:15px;flex-shrink:0}

  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap;display:inline-block;letter-spacing:.01em}
  .b-done{background:var(--done-soft);color:#12833d}
  .b-prog{background:var(--blue-soft);color:var(--blue)}
  .b-wait{background:var(--gray-soft);color:var(--ink-2)}
  .b-warn{background:var(--amber-soft);color:#b45f09}
  .b-risk{background:var(--rose-soft);color:var(--rose)}
  .b-na{background:#eef0f3;color:var(--ink-3)}
  .b-hold{background:var(--violet-soft);color:var(--violet)}
  .b-shared{background:var(--violet-soft);color:var(--violet)}
  .b-gone{background:#eceef2;color:#5a6472}
  .b-check{background:var(--rose-soft);color:var(--rose)}
  .tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;background:var(--gray-soft);color:var(--ink-2);letter-spacing:.02em;flex-shrink:0}
  .tag.t-rose{background:var(--rose-soft);color:var(--rose)} .tag.t-amber{background:var(--amber-soft);color:#b45f09}
  .tag.t-blue{background:var(--blue-soft);color:var(--blue)} .tag.t-violet{background:var(--violet-soft);color:var(--violet)}

  /* 라인 진행률 */
  .lineprog{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line-2)}
  .lineprog:last-child{border-bottom:none}
  .lineprog .lpl{font-size:12.5px;font-weight:700;min-width:150px}
  .lineprog .lpbar{flex:1;height:7px;background:var(--gray-soft);border-radius:20px;overflow:hidden}
  .lineprog .lpbar i{display:block;height:100%;border-radius:20px}
  .lineprog .lppct{font-size:12px;font-weight:800;min-width:40px;text-align:right}

  /* ===== 미니 캘린더 ===== */
  .weather-card{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 4px}
  .wday{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 2px;border-radius:10px}
  .wday.today{background:var(--blue-soft)}
  .wday .wd{font-size:11px;font-weight:700;color:var(--ink-2)}
  .wday.today .wd{color:var(--blue)}
  .wday .wic{font-size:19px;line-height:1}
  .wday .wt{display:flex;flex-direction:column;align-items:center;gap:1px}
  .wday .whi{font-size:12px;font-weight:800}
  .wday .wlo{font-size:11px;color:var(--ink-3);font-weight:600}
  .cal-cell{cursor:pointer}
  .cal-cell.sel{outline:2px solid var(--blue);outline-offset:-2px;border-radius:8px;color:var(--blue);font-weight:800}
  .cal-cell.today.sel{outline-color:#fff}
  .rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;background:var(--ink-3)}
  .rdot.p-rose{background:var(--rose)} .rdot.p-amber{background:var(--amber)}
  .rdot.p-blue{background:var(--blue)} .rdot.p-violet{background:var(--violet)}
  .rempty{font-size:12px;color:var(--ink-3);padding:12px 2px;text-align:center}
  /* 인증 */
  .cert-block{margin-top:10px} .cert-block:first-of-type{margin-top:8px}
  .cert-b-h{font-size:11px;font-weight:800;color:var(--brand);margin-bottom:5px}
  .cert-block .mgrid{grid-template-columns:1fr 1fr 1fr}
  .cert-x{color:var(--rose);font-weight:800}
  .cert-prog{color:var(--amber);font-weight:700}
  .doclink{color:var(--blue);font-weight:700;cursor:pointer}
  .doclink:hover{text-decoration:underline}
  /* 금일 업무 */
  .tchk{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;cursor:pointer}
  .tchk.on{background:var(--brand);border-color:var(--brand)}
  .addrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tinput{border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;color:var(--ink);background:var(--card)}
  .tinput:focus{border-color:var(--brand)}
  .addbtn{display:inline-flex;align-items:center;gap:6px;background:var(--brand);color:#fff;border:none;font-size:13px;font-weight:700;padding:9px 16px;border-radius:9px}
  .addbtn:hover{background:#1d4ed8}
  .tdel{border:none;background:transparent;color:var(--ink-3);font-size:13px;flex-shrink:0;padding:4px 6px;border-radius:6px}
  .tdel:hover{background:var(--rose-soft);color:var(--rose)}
  .savehint{font-size:11.5px;color:var(--ink-3);font-weight:600;margin-top:10px}
  .savehint.ok{color:var(--done);font-weight:700}
  /* 편집 가능 셀 */
  .editable{cursor:pointer;border-bottom:1px dashed var(--blue)!important;position:relative}
  .editable:hover{background:var(--blue-soft)}
  .celledit{width:80px;border:1px solid var(--blue);border-radius:6px;padding:4px 6px;font-size:12px;font-family:inherit;outline:none}
  .stedit{cursor:pointer}
  .stedit:hover{background:var(--blue-soft)}
  .pi-toggle{cursor:pointer}
  .pi-toggle:hover{background:var(--blue-soft)}
  .prog-cell{cursor:pointer}
  .prog-cell:hover{background:var(--blue-soft)}
  .matct{cursor:pointer}
  .matct:hover{background:var(--blue-soft)}
  .cal-nav{border:none;background:var(--gray-soft);color:var(--ink-2);width:24px;height:24px;border-radius:7px;font-size:15px;font-weight:800;cursor:pointer;line-height:1;flex-shrink:0}
  .cal-nav:hover{background:var(--brand);color:#fff}
  .ed-pencil{color:var(--ink-3);font-size:10px;opacity:0;transition:.1s}
  .stedit:hover .ed-pencil{opacity:1}
  /* .eml 드롭 영역 */
  .emldrop{background:var(--card);border:1.5px dashed var(--line);border-radius:13px;padding:22px 16px;text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
  .emldrop:hover{border-color:var(--brand);background:var(--blue-soft)}
  .emldrop.over{border-color:var(--brand);background:var(--blue-soft);transform:scale(1.01)}
  .emldrop .emld-ic{font-size:26px;margin-bottom:6px}
  .emldrop .emld-t{font-size:13px;font-weight:800}
  .emldrop .emld-s{font-size:11px;color:var(--ink-2);margin-top:4px;line-height:1.5;font-weight:500}
  /* 주간 */
  .wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:820px){.wk-grid{grid-template-columns:1fr}}
  /* 트렌드 뉴스 */
  .news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
  .news-card{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px;box-shadow:var(--shadow)}
  .news-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .news-date{font-size:11px;color:var(--ink-3);font-weight:600}
  .news-t{font-size:13.5px;font-weight:800;line-height:1.4;letter-spacing:-.01em}
  .news-s{font-size:12px;color:var(--ink-2);margin-top:7px;line-height:1.5}
  .news-src{font-size:11px;color:var(--ink-3);font-weight:700;margin-top:10px}
  .news-card{cursor:pointer;transition:.12s;position:relative}
  .news-del{position:absolute;top:8px;right:8px;border:none;background:transparent;color:var(--ink-3);font-size:12px;padding:3px 6px;border-radius:6px;opacity:0;transition:.1s;z-index:2}
  .news-card:hover .news-del{opacity:1}
  .news-del:hover{background:var(--rose-soft);color:var(--rose)}
  .news-card:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:var(--shadow-lg)}
  .news-more{color:var(--brand);float:right}
  .trend-search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:10px 14px;box-shadow:var(--shadow)}
  .trend-search .ts-ic{font-size:14px;opacity:.6}
  .trend-search input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;background:transparent;color:var(--ink)}
  .trend-search .ts-clear{border:none;background:var(--gray-soft);color:var(--ink-2);width:22px;height:22px;border-radius:50%;font-size:11px;cursor:pointer;flex-shrink:0}
  .trend-link{display:inline-flex;align-items:center;gap:6px;margin-top:16px;background:var(--brand);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px}
  .trend-link:hover{background:#1d4ed8}
  /* 원료 */
  .ing-y{color:#12833d;font-weight:800;font-size:12px}
  .ing-n{color:var(--ink-3);font-weight:700;font-size:12px}
  .igchk{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer}
  .igchk input{cursor:pointer}
  .fieldrow{margin-bottom:12px}
  .flbl{display:block;font-size:11.5px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .ing-box{max-width:560px}
  .ing-sec-h{font-size:11.5px;font-weight:800;color:var(--brand);margin-bottom:7px}
  .ing-text{font-size:12.5px;line-height:1.7;color:var(--ink-2);word-break:keep-all;background:var(--bg);border-radius:10px;padding:12px 14px}
  .cal{padding:4px 2px}
  .cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-h .cm{font-size:13px;font-weight:800}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cal-grid .cw{font-size:10px;color:var(--ink-3);font-weight:700;text-align:center;padding:4px 0}

<div id="lockScreen" style="position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#eef2f7,#e3e9f2);display:flex;align-items:center;justify-content:center;font-family:'Pretendard',-apple-system,sans-serif">

    <input id="lockInput" type="password" placeholder="암호" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1.5px solid #d8e0ea;border-radius:11px;font-size:15px;outline:none;text-align:center;margin-bottom:10px" autocomplete="off">
    <div id="lockError" style="color:#d0463b;font-size:12px;font-weight:700;height:16px;margin-bottom:8px"></div>
    <button id="lockBtn" style="width:100%;padding:12px;background:linear-gradient(135deg,#3b6fd4,#5b8def);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer">열기</button>

<script>
(function(){
  // ===== 암호 설정 (여기 글자만 바꾸면 암호가 바뀝니다) =====
  var PASSWORD = "24686812^";
  // =====================================================
  var KEY = "fiorese_unlocked";
  function unlock(){
    document.getElementById("lockScreen").style.display="none";
    try{ sessionStorage.setItem(KEY,"1"); }catch(e){}
  }
  // 이미 이번 세션에 풀었으면 통과
  try{ if(sessionStorage.getItem(KEY)==="1"){ unlock(); } }catch(e){}
  function tryUnlock(){
    var v=document.getElementById("lockInput").value;
    if(v===PASSWORD){ unlock(); }
    else{
      document.getElementById("lockError").textContent="암호가 맞지 않습니다";
      document.getElementById("lockInput").value="";
    }
  }
  document.addEventListener("DOMContentLoaded",function(){
    var btn=document.getElementById("lockBtn");
    var inp=document.getElementById("lockInput");
    if(btn) btn.addEventListener("click",tryUnlock);
    if(inp){ inp.addEventListener("keydown",function(e){ if(e.key==="Enter") tryUnlock(); }); inp.focus(); }
  });
})();
</script>

  "fiorese_cost","fiorese_order","fiorese_tm","fiorese_checks","fiorese_notifs",

// 금일 업무는 날짜별 키라 별도 처리 (오늘 것만)
function todayKeyForSync(){const d=new Date();return "fiorese_today_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}

let sheetSyncTimer = null;
let sheetLoaded = false;

// 시트에서 전체 데이터 불러와 localStorage에 넣기 (켤 때 1회)
async function loadFromSheet(){
  try{
    const res = await fetch(SHEET_URL + "?key=" + encodeURIComponent(SHEET_KEY));
    const text = await res.text();
    const all = JSON.parse(text || "{}");
    if(all && typeof all === "object"){
      Object.keys(all).forEach(k=>{
        try{ localStorage.setItem(k, all[k]); }catch(e){}
      });
      sheetLoaded = true;
    }
  }catch(e){
    console.log("시트 불러오기 실패(오프라인일 수 있음):", e);
  }
}

// localStorage의 모든 fiorese_ 데이터를 모아 시트로 저장 (변경 후 잠시 뒤)
function saveToSheet(){
  if(sheetSyncTimer) clearTimeout(sheetSyncTimer);
  sheetSyncTimer = setTimeout(async ()=>{
    const all = {};
    const keys = SYNC_KEYS.concat([todayKeyForSync()]);
    keys.forEach(k=>{
      const v = localStorage.getItem(k);
      if(v !== null) all[k] = v;
    });
    try{
      await fetch(SHEET_URL + "?key=" + encodeURIComponent(SHEET_KEY), {
        method:"POST",
        body: JSON.stringify(all)
      });
      showSyncBadge("saved");
    }catch(e){
      console.log("시트 저장 실패:", e);
      showSyncBadge("error");
    }
  }, 1200); // 1.2초 모아서 한 번에 저장
}

// 저장 상태 작은 표시
function showSyncBadge(state){
  let b = document.getElementById("syncBadge");
  if(!b){
    b = document.createElement("div");
    b.id = "syncBadge";
    b.style.cssText = "position:fixed;bottom:16px;right:16px;z-index:200;font-size:12px;font-weight:700;padding:8px 14px;border-radius:20px;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:.2s;pointer-events:none";
    document.body.appendChild(b);
  }
  if(state==="saved"){ b.textContent="✓ 클라우드 저장됨"; b.style.background="#e7f6ec"; b.style.color="#12833d"; }
  else if(state==="saving"){ b.textContent="⟳ 저장 중..."; b.style.background="#eef2ff"; b.style.color="#2563eb"; }
  else { b.textContent="⚠ 저장 실패 (인터넷 확인)"; b.style.background="#fdeaea"; b.style.color="#c0392b"; }
  b.style.opacity="1";
  clearTimeout(b._t);
  b._t = setTimeout(()=>{ b.style.opacity="0"; }, 2500);
}

/* 제품 진행률 계산 (해당없음 트랙 제외; 임상은 참조 상태로 환산) */
function prodProgress(p){
  let done=0,appl=0;
  TRACK_ORDER.forEach(k=>{
    let st;
    if(k==="임상"){const s=studyOf(p.name); st=s?s.status[0]:"na";}
    else st=p.tracks[k]?p.tracks[k][0]:"na";
    if(st==="na"||st===undefined)return;
    appl++; if(st==="done")done++;
  });
  return appl?Math.round(done/appl*100):0;
}

/* ============================================================
   대시보드
============================================================ */

function buildProgress(){
  // 상태 → 표시 규칙: done=완료(배지), hold=홀딩(배지), 그 외는 메모 텍스트로
  function statusCell(st,memo){
    if(st==="done") return `${badge("done","완료")}`;
    if(st==="hold") return `${badge("hold","홀딩")}`;
    // 진행중/주의/지연/대기 → 배지 없이 확인 내용(memo)만
    return `<span class="tmemo-inline">${memo||"진행중"}</span>`;
  }
  function trackRow(p,k){
    let st,memo,expandable=false,subHTML="";
    if(k==="디자인"){
      if(!p.tracks[k]){st="na";memo="해당없음";}
      else [st,memo]=p.tracks[k];
      expandable=true;
      const items=MUN_KEYS.map(mk=>`<div class="sub-item"><span class="si-k">${mk}</span>${badge(p.mun&&p.mun[mk]?(p.mun[mk][0]==="done"?"done":"wait"):"wait",p.mun&&p.mun[mk]?p.mun[mk][1]:"대기")}</div>`).join("");
      subHTML=`<div class="subwrap"><div class="flow-note">문안 흐름: 1차 기획 → 제조사 확인 → CPNP/MoCRA 등록업체 확인 → 수정</div><div class="subgrid">${items}</div></div>`;
    } else {
      if(!p.tracks[k]){st="na";memo="해당없음";}
      else [st,memo]=p.tracks[k];
    }
    const showBadge = st==="done"||st==="hold";
    return `<div class="track ${expandable?'expandable':''}">
      <div class="track-main">
        <span class="tname">${k}</span>
        <span class="tval">${st==="na"?'<span class="tmemo-inline dim">해당없음</span>':statusCell(st,memo)}</span>
        ${expandable?'<span class="caret">▶</span>':''}
      </div>${subHTML}</div>`;
  }
  function card(p){
    const rows=TRACK_ORDER.map(k=>trackRow(p,k)).join("");
    return `<div class="mcard ${p.line}">
      <div class="hd"><div><div class="pn">${p.name}</div><div class="vol">${p.vol}</div></div></div>
      <div class="tracks">${rows}</div></div>`;
  }
  const cardHTML=["ph","gb"].map(l=>`<div class="lgroup">${lineChip(l)}<div class="cards">${products.filter(p=>p.line===l).map(card).join("")}</div></div>`).join("");

  // 표: 제품 × 트랙(기획·처방·디자인·인증), 각 칸 클릭 편집
  const head=`<thead><tr><th class="stickyc">제품명</th><th class="vline">용량</th>${TRACK_ORDER.map(t=>`<th class="vline">${t}</th>`).join("")}<th class="vline"></th></tr></thead>`;
  const body=products.map((p,pi)=>{
    const cells=TRACK_ORDER.map(k=>{
      const has=!!p.tracks[k];
      const st=has?p.tracks[k][0]:"na";
      const memo=has?p.tracks[k][1]:"";
      let inner;
      if(st==="done") inner=badge("done","완료");
      else if(st==="hold") inner=badge("hold","홀딩");
      else if(st==="na") inner='<span class="tmemo-inline dim">해당없음</span>';
      else inner=`<span class="tmemo-inline">${memo||"진행중"}</span>`;
      return `<td class="vline prog-cell" data-progedit="${pi}" data-progk="${k}" title="클릭해서 수정">${inner}</td>`;
    }).join("");
    return `<tr class="${p.line}-row"><td class="stickyc editable" data-progname="${pi}" title="클릭해서 수정">${p.name}</td><td class="vline editable" data-progvol="${pi}" title="클릭해서 수정">${p.vol}</td>${cells}<td class="vline"><button class="tdel" data-progdel="${pi}" aria-label="삭제">✕</button></td></tr>`;
  }).join("");
  const tableHTML=`<div class="tablecard"><div class="scrollx"><table class="vtable">${head}<tbody>${body}</tbody></table></div></div>`;

  const addForm=`<div class="block">
    <div class="block-h"><div class="bt">➕ 제품 추가</div></div>
    <div class="card" style="padding:13px"><div class="addrow" style="flex-wrap:wrap">
      <select id="prAddLine" class="tinput" style="max-width:150px"><option value="ph">Pure Hydra</option><option value="gb">Glow & Barrier</option></select>
      <input id="prAddName" class="tinput" placeholder="제품명" style="flex:1;min-width:150px">
      <input id="prAddVol" class="tinput" placeholder="용량 (예: 50ml)" style="max-width:130px">
      <button class="addbtn" id="prAdd">추가</button>
    </div></div></div>`;

  document.getElementById("progress").innerHTML=shell("progress","제품 진행 현황","기획 · 처방 · 디자인(문안) · 인증",cardHTML,tableHTML,
    `<div class="banner">👉 표에서 각 칸을 눌러 <b>상태·내용을 직접 수정</b>하고, 제품을 추가·삭제할 수 있습니다.</div>`+addForm);
}

/* 발주 — 부자재별 발주일/입고일 분리 */
const MAT_LIST=[["tube","용기/튜브"],["cap","캡/펌프"],["label","라벨"],["seal","봉합라벨"],["box","단상자"],["carton","카톤박스"]];
function buildOrder(){
  const CT_MATS=new Set(["tube","cap"]); // CT 상태가 있는 부자재
  function ctBadge(ct){
    if(!ct) return "—";
    const map={"완료":"b-done","진행중":"b-prog","샘플요청":"b-warn"};
    return `<span class="badge ${map[ct]||'b-wait'}">${ct}</span>`;
  }
  // 카드: 부자재 셀 (CT 포함)
  function matCell(x,label,hasCT){
    if(!x) return `<div class="cell"><div class="ck">${label}</div><div class="cv">—</div></div>`;
    if(x.na) return `<div class="cell"><div class="ck">${label}</div>${hasCT?`<div style="font-size:10.5px;margin:2px 0"><span style="color:var(--ink-3);font-weight:700">CT</span> ${ctBadge(x.ct)}</div>`:''}<div class="cv"><span class="badge b-na">해당없음</span></div></div>`;
    const o=x.o||"—", i=x.i||"—";
    const iStyle=x.late?'color:var(--rose);font-weight:800':'';
    return `<div class="cell"><div class="ck">${label}</div>
      <div style="display:flex;flex-direction:column;gap:2px;margin-top:2px">
        ${hasCT?`<div style="font-size:10.5px"><span style="color:var(--ink-3);font-weight:700">CT</span> ${ctBadge(x.ct)}</div>`:''}
        <div style="font-size:11px"><span style="color:var(--ink-3);font-weight:700">발주</span> ${o}</div>
        <div style="font-size:11px"><span style="color:var(--ink-3);font-weight:700">입고</span> <span style="${iStyle}">${i}</span></div>
      </div></div>`;
  }
  function card(o){
    const stockNum=parseInt((o.total||"0").replace(/,/g,""))||0;
    const stockBadge=stockNum===0?badge("risk","재고 0"):badge("done","재고 "+o.total);
    const mats=MAT_LIST.map(([k,lbl])=>matCell(o[k],lbl,CT_MATS.has(k))).join("");
    return `<div class="mcard ${o.line}">
      <div class="hd"><div><div class="pn">${o.code?o.code+" · ":""}${o.name}</div><div class="vol">${o.vol} · ${o.maker}</div></div>${stockBadge}</div>
      <div class="mgrid">${mats}</div>
      <div class="mrow"><span class="k">완제품 발주 / 입고</span><span class="v">${o.fillOd||"—"} → ${o.fillId||"—"}</span></div>
      ${o.note?`<div class="mrow"><span class="k">비고</span><span class="v" style="color:var(--ink-2)">${o.note}</span></div>`:""}
      <div class="mrow"><span class="k">타임스케줄</span><span class="v"><span class="doclink" data-file="${o.sched}">📄 미리보기</span></span></div>
    </div>`;
  }
  const cardHTML=["ph","gb"].map(l=>`<div class="lgroup">${lineChip(l)}<div class="cards">${orderData.filter(o=>o.line===l).map(card).join("")}</div></div>`).join("");

  // 표: CT(tube,cap만) + 발주일/입고일, 세로선, 타임스케줄 열
  function oCell(x){ if(!x||x.na) return "—"; return x.o||"—"; }
  function iCell(x){ if(!x||x.na) return "—"; const v=x.i||"—"; return x.late?`<span style="color:var(--rose);font-weight:800">${v}</span>`:v; }
  const grpHead=MAT_LIST.map(([k,lbl])=>`<th class="grp vline" colspan="${CT_MATS.has(k)?3:2}">${lbl}</th>`).join("");
  const subHead=MAT_LIST.map(([k])=>CT_MATS.has(k)?`<th class="vline">CT</th><th>발주일</th><th>입고일</th>`:`<th class="vline">발주일</th><th>입고일</th>`).join("");
  const head=`<thead>
    <tr><th class="stickyc" rowspan="2">제품명</th><th class="vline" rowspan="2">제품 코드</th><th rowspan="2">용량</th><th rowspan="2">제조사</th>
      ${grpHead}
      <th class="grp vline" rowspan="2">완제품<br>발주일</th><th rowspan="2">완제품<br>입고일</th><th class="grp right vline" rowspan="2">총재고</th><th class="vline" rowspan="2">비고</th><th class="vline" rowspan="2">타임스케줄</th></tr>
    <tr>${subHead}</tr>
  </thead>`;
  const body=orderData.map((o,oi)=>{
    const mats=MAT_LIST.map(([k])=>{
      const x=o[k];
      const na=!x||x.na;
      const ct=CT_MATS.has(k)?(na?`<td class="vline">—</td>`:`<td class="vline matct" data-matedit="${oi}" data-matk="${k}" data-matf="ct" title="클릭해서 수정">${ctBadge(x.ct)}</td>`):'';
      const first=CT_MATS.has(k)?'':' vline';
      const oc=na?`<td class="num${first}">—</td>`:`<td class="num${first} editable" data-matedit="${oi}" data-matk="${k}" data-matf="o" title="클릭해서 수정">${x.o||"—"}</td>`;
      const ic=na?`<td class="num">—</td>`:`<td class="num editable" data-matedit="${oi}" data-matk="${k}" data-matf="i" title="클릭해서 수정">${x.i||"—"}</td>`;
      return `${ct}${oc}${ic}`;
    }).join("");
    return `<tr class="${o.line}-row"><td class="stickyc">${o.name}</td><td class="vline editable" data-oedit="${oi}" data-ofield="code" title="클릭해서 수정">${o.code||"—"}</td><td class="editable" data-oedit="${oi}" data-ofield="vol" title="클릭해서 수정">${o.vol}</td><td class="editable" data-oedit="${oi}" data-ofield="maker" title="클릭해서 수정">${o.maker}</td>
      ${mats}
      <td class="num vline editable" data-oedit="${oi}" data-ofield="fillOd" title="클릭해서 수정">${o.fillOd||"—"}</td>
      <td class="num editable" data-oedit="${oi}" data-ofield="fillId" title="클릭해서 수정">${o.fillId||"—"}</td>
      <td class="num right vline editable" data-oedit="${oi}" data-ofield="total" style="${(o.total==='0')?'color:var(--rose);font-weight:700':''}" title="클릭해서 수정">${o.total}</td>
      <td class="vline editable" data-oedit="${oi}" data-ofield="note" style="white-space:normal;min-width:160px;color:var(--ink-2)" title="클릭해서 수정">${o.note||"—"}</td>
      <td class="vline"><span class="doclink" data-file="${o.sched}">📄 미리보기</span></td></tr>`;
  }).join("");
  const tableHTML=`<div class="tablecard"><div class="scrollx"><table class="vtable">${head}<tbody>${body}</tbody></table></div></div>`;
  document.getElementById("order").innerHTML=shell("order","발주·입고","부자재별 CT·발주일·입고일 · 제품별 타임스케줄 (2026 상반기)",cardHTML,tableHTML,
    `<div class="banner">👉 표의 <b>모든 칸</b>(부자재 발주일·입고일·CT·재고·비고 등)을 눌러 직접 수정할 수 있습니다. 📄 타임스케줄로 파일 미리보기가 열립니다.</div>`);
}

/* 상표 — 국내 / 해외-마드리드 / 해외-개별 3구획 */
function buildTM(){
  function typeInfo(t){
    if(t.group==="madrid") return {label:"마드리드",cls:"b-hold"};
    if(t.group==="individual") return {label:"개별",cls:"b-prog"};

  function card(t){
    const ti=typeInfo(t);
    return `<div class="mcard">
      <div class="hd"><div><div class="pn">${t.country} <span class="badge ${ti.cls}" style="margin-left:4px">${ti.label}</span></div><div class="vol">${t.mark} · ${t.cls} · ${t.agent}</div></div>${badge(t.status[0],t.status[1])}</div>
      <div class="mrow"><span class="k">상세현황</span><span class="v">${t.detail}</span></div>

        <div class="cell"><div class="ck">${t.group==="madrid"?"국제등록번호":"출원번호"}</div><div class="cv">${t.no}</div></div>
        <div class="cell"><div class="ck">${t.group==="madrid"?"갱신기한":"등록/갱신일"}</div><div class="cv">${t.group==="madrid"?(t.renew||"—"):t.regDate}</div></div>
      </div>
      ${t.note?`<div class="mrow"><span class="k">비고</span><span class="v" style="color:var(--ink-2)">${t.note}</span></div>`:""}
    </div>`;
  }
  const cardHTML=`<div class="cards">${tmData.map(card).join("")}</div>`;

  // 표: 구분을 맨 왼쪽, 소제목 삭제, 세로선
  const head=`<thead><tr><th class="stickyc">구분</th><th class="vline">국가</th><th class="vline">상표명</th><th class="vline">류</th><th class="vline">대리인</th><th class="vline">현황</th><th class="vline">상세</th><th class="vline">출원/국제번호</th><th class="vline">등록·갱신</th><th class="vline">비고</th></tr></thead>`;
  const body=tmData.map((t,ti_i)=>{
    const ti=typeInfo(t);

    return `<tr><td class="stickyc"><span class="badge ${ti.cls}">${ti.label}</span></td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="country" title="클릭해서 수정">${t.country}</td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="mark" title="클릭해서 수정">${t.mark}</td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="cls" title="클릭해서 수정">${t.cls}</td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="agent" title="클릭해서 수정">${t.agent}</td>
      <td class="vline stedit" data-tmedit="${ti_i}" title="클릭해서 상태 변경">${badge(t.status[0],t.status[1])} <span class="ed-pencil">✎</span></td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="detail" style="white-space:normal;min-width:150px" title="클릭해서 수정">${t.detail}</td>
      <td class="vline num editable" data-tmfield="${ti_i}" data-tmf="no" title="클릭해서 수정">${t.no}</td>
      <td class="vline num editable" data-tmfield="${ti_i}" data-tmf="${dateField}" title="클릭해서 수정">${dateVal}</td>
      <td class="vline editable" data-tmfield="${ti_i}" data-tmf="note" style="white-space:normal;min-width:150px;color:var(--ink-2)" title="클릭해서 수정">${t.note}</td></tr>`;
  }).join("");
  const tableHTML=`<div class="tablecard"><div class="scrollx"><table class="vtable">${head}<tbody>${body}</tbody></table></div></div>`;
  document.getElementById("tm").innerHTML=shell("tm","상표 현황","구분(국내/마드리드/개별) · 03류 중심",cardHTML,tableHTML,
    `<div class="banner">👉 표의 <b>모든 칸</b>을 눌러 직접 수정할 수 있습니다. 현황(상태)은 ✎로 선택합니다.</div>`);
}

let weekWeather=[
  {d:"일",ic:"☀️",hi:24,lo:14,desc:"맑음"},
  {d:"월",ic:"⛅",hi:23,lo:15,desc:"구름조금"},

  {d:"금",ic:"☀️",hi:25,lo:15,desc:"맑음"},

];

const WEEKDAY_KR=["일","월","화","수","목","금","토"];
// 날씨 코드 → 이모지
function wmoIcon(code){
  if(code===0) return "☀️";
  if(code<=2) return "🌤️";
  if(code===3) return "☁️";
  if(code>=45&&code<=48) return "🌫️";
  if(code>=51&&code<=67) return "🌧️";
  if(code>=71&&code<=77) return "❄️";
  if(code>=80&&code<=82) return "🌧️";
  if(code>=95) return "⛈️";
  return "⛅";
}
function wmoDesc(code){
  if(code===0) return "맑음";
  if(code<=2) return "구름조금";
  if(code===3) return "흐림";
  if(code>=45&&code<=48) return "안개";
  if(code>=51&&code<=67) return "비";
  if(code>=71&&code<=77) return "눈";
  if(code>=80&&code<=82) return "소나기";
  if(code>=95) return "뇌우";
  return "구름많음";
}
// 수원 좌표로 이번 주 날씨 가져오기 (무료 Open-Meteo · 가입 불필요)
let weatherTodayDow=new Date().getDay(); // 오늘 요일 (0=일 ~ 6=토)
async function loadWeather(){
  try{
    // 이번 주 일요일 ~ 토요일 날짜 계산
    const now=new Date();
    const sun=new Date(now); sun.setDate(now.getDate()-now.getDay()); // 이번 주 일요일
    const sat=new Date(sun); sat.setDate(sun.getDate()+6);           // 이번 주 토요일
    const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const url="https://api.open-meteo.com/v1/forecast?latitude=37.2636&longitude=127.0286&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul&start_date="+fmt(sun)+"&end_date="+fmt(sat);
    const res=await fetch(url);
    const j=await res.json();
    if(j&&j.daily&&j.daily.time){
      const arr=[];
      for(let i=0;i<j.daily.time.length;i++){
        const dt=new Date(j.daily.time[i]+"T00:00:00");
        arr.push({
          d:WEEKDAY_KR[dt.getDay()],
          ic:wmoIcon(j.daily.weathercode[i]),
          hi:Math.round(j.daily.temperature_2m_max[i]),
          lo:Math.round(j.daily.temperature_2m_min[i]),
          desc:wmoDesc(j.daily.weathercode[i])
        });
      }
      if(arr.length){ weekWeather=arr; weatherLive=true; }
    }
  }catch(e){ console.log("날씨 불러오기 실패(샘플 표시):",e); }
}

function renderCalendar(){
  const weeks=["일","월","화","수","목","금","토"];
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const now=new Date();
  const isThisMonth=(now.getFullYear()===calYear&&now.getMonth()===calMonth);
  const today=now.getDate();
  let cells=weeks.map(w=>`<div class="cw">${w}</div>`).join("");
  for(let i=0;i<firstDow;i++)cells+=`<div class="cal-cell dim"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const has=scheduleByDate[sKey(calYear,calMonth,d)]?"has":"";
    const cls=[(isThisMonth&&d===today)?"today":"",has,d===selectedDate?"sel":""].join(" ");
    cells+=`<div class="cal-cell ${cls}" data-day="${d}">${d}</div>`;
  }
  document.getElementById("calGrid").innerHTML=cells;
  const t=document.getElementById("calTitle"); if(t)t.textContent=`${calYear}년 ${calMonth+1}월`;
}
function renderSchedule(){
  const key=sKey(calYear,calMonth,selectedDate);

  NOTIF_RULES.forEach(r=>{ if(r.kw.some(k=>low.includes(k.toLowerCase()))) hits.push(r); });

/* MIME 헤더 디코딩 (=?UTF-8?B?...?= / =?UTF-8?Q?...?=) */
function decodeMimeHeader(str){
  if(!str) return "";
  str=str.replace(/=\?([^?]+)\?([BbQq])\?([^?]*)\?=/g,(m,charset,enc,text)=>{
    try{
      if(enc.toUpperCase()==="B"){
        const bin=atob(text.replace(/\s/g,""));
        const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
        return new TextDecoder(charset).decode(bytes);
      }else{
        // Q 인코딩
        let t=text.replace(/_/g," ").replace(/=([0-9A-Fa-f]{2})/g,(x,h)=>String.fromCharCode(parseInt(h,16)));
        const bytes=Uint8Array.from(t,c=>c.charCodeAt(0));
        return new TextDecoder(charset).decode(bytes);
      }
    }catch(e){return text;}
  });
  return str.replace(/\?=\s*=\?/g,"").trim();
}
/* .eml 원문에서 Subject/From/Date 추출 */
function parseEml(raw){
  // 헤더는 빈 줄 전까지. 접힌 헤더(다음 줄이 공백으로 시작) 펼치기
  const headerPart=raw.split(/\r?\n\r?\n/)[0];
  const unfolded=headerPart.replace(/\r?\n[ \t]+/g," ");
  const lines=unfolded.split(/\r?\n/);
  const get=name=>{
    const line=lines.find(l=>l.toLowerCase().startsWith(name.toLowerCase()+":"));
    return line?line.slice(line.indexOf(":")+1).trim():"";
  };
  let subject=decodeMimeHeader(get("Subject"));
  let from=decodeMimeHeader(get("From"));
  // From에서 이름만 추출 (홍길동 <a@b.com> → 홍길동)
  const nameMatch=from.match(/^\s*"?([^"<]+?)"?\s*</);
  if(nameMatch) from=nameMatch[1].trim();
  else from=from.replace(/[<>]/g,"").trim();
  // Date 간략화
  let date=get("Date");
  if(date){ const d=new Date(date); if(!isNaN(d)) date=`${d.getMonth()+1}/${d.getDate()}`; }
  return {subject,from,date};
}

/* ===== 전역: .eml 업로드 처리 (대시보드에서 사용) ===== */
function flashUploadMsg(msg){
  const h=document.getElementById("upHint");
  if(h){h.textContent="✓ "+msg;h.classList.add("ok");setTimeout(()=>{h.textContent="메일(.eml)을 올리면 금일 업무에 추가되고 관련 탭 확인 알림이 뜹니다.";h.classList.remove("ok");},2400);}
}
function handleEmlFiles(fileList){
  const all=[...fileList];
  if(!all.length)return;
  const emls=all.filter(f=>/\.eml$/i.test(f.name)||f.type==="message/rfc822");
  const others=all.filter(f=>!(/\.eml$/i.test(f.name)||f.type==="message/rfc822"));
  let added=0, notified=0;
  // 메일 외 파일: 파일명으로 금일 업무에 추가
  others.forEach(f=>{
    todayTasks.push({done:false,src:"파일",title:"📎 "+f.name,meta:"파일 등록 · "+(Math.round(f.size/1024))+"KB"});
    added++;
  });
  if(!emls.length){
    saveToday(); if(document.getElementById("today").innerHTML)buildToday();
    flashUploadMsg(`파일 ${added}건 등록`); return;
  }
  let pending=emls.length;
  emls.forEach(file=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const info=parseEml(reader.result);
      if(info.subject){
        todayTasks.push({done:false,src:"메일",title:info.subject,meta:(info.from?info.from:"")+(info.date?" · "+info.date:"")||"메일 등록"});
        notified+=addNotifsForMail(info.subject,info.from);
        added++;
      }
      if(--pending===0){ saveToday(); if(document.getElementById("today").innerHTML)buildToday();
        flashUploadMsg(`${added}건 등록${notified?` · 관련 탭 알림 ${notified}건`:""}`); }
    };
    reader.onerror=()=>{ if(--pending===0){saveToday();if(document.getElementById("today").innerHTML)buildToday();flashUploadMsg(added+"건 등록됨");} };
    reader.readAsText(file,"utf-8");
  });
}
function bindUploader(){
  const drop=document.getElementById("upDrop");
  const finput=document.getElementById("upInput");
  if(!drop||!finput) return;
  drop.onclick=()=>finput.click();
  finput.onchange=()=>{ handleEmlFiles(finput.files); finput.value=""; };
  drop.ondragover=e=>{e.preventDefault();drop.classList.add("over");};
  drop.ondragleave=()=>drop.classList.remove("over");
  drop.ondrop=e=>{e.preventDefault();drop.classList.remove("over");handleEmlFiles(e.dataTransfer.files);};
}

/* 이벤트 위임 */
document.body.addEventListener("click",e=>{
  // 알림 항목 클릭 → 해당 탭으로 이동
  const nitem=e.target.closest(".notif-item[data-notif]");
  if(nitem){const i=+nitem.dataset.notif;const n=notifs[i];
    document.getElementById("notifPanel").classList.remove("show");
    if(n){switchTab(n.tab);}return;}
  if(e.target.id==="notifClear"){notifs=[];saveNotifs();renderNotifPanel();renderNotifDot();return;}
  // 트렌드 검색 클리어
  if(e.target.id==="trSearchClear"){trendSearch="";buildTrend();return;}
  // 트렌드 삭제
  const trDel=e.target.closest("[data-trenddel]");
  if(trDel){e.stopPropagation();trendData.splice(+trDel.dataset.trenddel,1);saveTrend();buildTrend();return;}
  // 트렌드 추가
  if(e.target.id==="trAdd"){
    const cat=document.getElementById("trAddCat").value;
    const title=(document.getElementById("trAddTitle").value||"").trim();
    const src=(document.getElementById("trAddSrc").value||"").trim();
    const url=(document.getElementById("trAddUrl").value||"").trim();
    const sum=(document.getElementById("trAddSum").value||"").trim();
    const body=(document.getElementById("trAddBody").value||"").trim();
    if(title){
      const tagMap={"규제":"t-rose","인증":"t-blue","신제품":"t-violet","트렌드":"t-amber"};
      const d=new Date();const date=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
      trendData.unshift({cat,tag:tagMap[cat]||"t-blue",title,src:src||"직접 등록",date,sum:sum||"",body:body||sum||"",url});
      saveTrend();buildTrend();
    }
    return;
  }
  // 트렌드 카드 클릭 → 상세 팝업
  const tcard=e.target.closest(".news-card[data-trend]");
  if(tcard){openTrend(+tcard.dataset.trend);return;}
  if(e.target.closest("#trendClose")||e.target.id==="trendModal"){closeTrend();return;}
  // 진행현황: 제품명/용량 편집
  const pgname=e.target.closest(".editable[data-progname]");
  if(pgname&&!pgname.querySelector("input")){
    const i=+pgname.dataset.progname;const cur=products[i].name;
    pgname.innerHTML=`<input class="celledit" style="width:100%" value="${cur.replace(/"/g,'&quot;')}">`;
    const inp=pgname.querySelector("input");inp.focus();inp.select();
    const c=()=>{products[i].name=inp.value.trim();saveProd();buildProgress();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")c();if(ev.key==="Escape")buildProgress();};inp.onblur=c;return;
  }
  const pgvol=e.target.closest(".editable[data-progvol]");
  if(pgvol&&!pgvol.querySelector("input")){
    const i=+pgvol.dataset.progvol;const cur=products[i].vol;
    pgvol.innerHTML=`<input class="celledit" value="${cur.replace(/"/g,'&quot;')}">`;
    const inp=pgvol.querySelector("input");inp.focus();inp.select();
    const c=()=>{products[i].vol=inp.value.trim();saveProd();buildProgress();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")c();if(ev.key==="Escape")buildProgress();};inp.onblur=c;return;
  }
  // 진행현황: 트랙 셀 편집 (상태 + 메모)
  const pgcell=e.target.closest(".prog-cell[data-progedit]");
  if(pgcell&&!pgcell.querySelector("select")){
    const i=+pgcell.dataset.progedit, k=pgcell.dataset.progk;
    const has=!!products[i].tracks[k];
    const curSt=has?products[i].tracks[k][0]:"na";
    const curMemo=has?products[i].tracks[k][1]:"";
    pgcell.innerHTML=`<select class="celledit" style="width:88px;margin-bottom:4px">${PROG_STATUS.map(([v,l])=>`<option value="${v}" ${v===curSt?'selected':''}>${l}</option>`).join("")}</select><input class="celledit prog-memo" style="width:100%" value="${(curMemo||'').replace(/"/g,'&quot;')}" placeholder="확인 내용(선택)">`;
    const sel=pgcell.querySelector("select");const inp=pgcell.querySelector("input");sel.focus();
    const c=()=>{const st=sel.value;if(st==="na"){delete products[i].tracks[k];}else{products[i].tracks[k]=[st,inp.value.trim()];}saveProd();buildProgress();};
    sel.onchange=()=>{if(sel.value==="na"){c();}};
    inp.onkeydown=ev=>{if(ev.key==="Enter")c();if(ev.key==="Escape")buildProgress();};
    inp.onblur=c;
    return;
  }
  // 진행현황: 제품 삭제
  const pgdel=e.target.closest("[data-progdel]");
  if(pgdel){const i=+pgdel.dataset.progdel;if(confirm(`"${products[i].name}"을(를) 삭제할까요?`)){products.splice(i,1);saveProd();buildProgress();}return;}
  // 진행현황: 제품 추가
  if(e.target.id==="prAdd"){
    const name=(document.getElementById("prAddName").value||"").trim();
    const line=document.getElementById("prAddLine").value;
    const vol=(document.getElementById("prAddVol").value||"").trim();
    if(name){products.push({line,name,vol:vol||"-",tracks:{},mun:{}});saveProd();buildProgress();}
    return;
  }
  // 제품정보 인증 O/X 토글
  const pitoggle=e.target.closest(".pi-toggle[data-pitoggle]");
  if(pitoggle){const i=+pitoggle.dataset.pitoggle, c=pitoggle.dataset.pic;productInfo[i][c]=!productInfo[i][c];savePi();buildProductInfo();return;}
  // 제품정보 삭제
  const pidel=e.target.closest("[data-pidel]");
  if(pidel){const i=+pidel.dataset.pidel;if(confirm(`"${productInfo[i].name}"을(를) 삭제할까요?`)){productInfo.splice(i,1);savePi();buildProductInfo();}return;}
  // 제품정보 추가
  if(e.target.id==="piAdd"){
    const name=(document.getElementById("piAddName").value||"").trim();
    if(name){productInfo.push({line:document.getElementById("piAddLine").value,code:(document.getElementById("piAddCode").value||"").trim()||"-",name,vol:(document.getElementById("piAddVol").value||"").trim()||"-",cat:(document.getElementById("piAddCat").value||"").trim(),lab:"-",key:"",eff:"",vegan:false,cpnp:false,mocra:false,kor:"",eng:""});savePi();buildProductInfo();}
    return;
  }
  // 제품정보 값 편집 (랩넘버/핵심성분)
  const piedit=e.target.closest(".editable[data-piedit]");
  if(piedit&&!piedit.querySelector("input")){
    const i=+piedit.dataset.piedit, f=piedit.dataset.pif;
    const cur=productInfo[i][f]||"";
    piedit.innerHTML=`<input class="celledit" style="width:100%" value="${cur.replace(/"/g,'&quot;')}" placeholder="입력">`;
    const inp=piedit.querySelector("input");inp.focus();inp.select();
    const commit=()=>{productInfo[i][f]=inp.value.trim();savePi();buildProductInfo();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")commit();if(ev.key==="Escape")buildProductInfo();};
    inp.onblur=commit;
    return;
  }
  // 원료 삭제
  const igDel=e.target.closest("[data-ingdel]");
  if(igDel){ingredientData.splice(+igDel.dataset.ingdel,1);saveIng();buildIngredient();return;}
  // 원료 추가
  if(e.target.id==="igAdd"){
    const name=(document.getElementById("igName").value||"").trim();
    if(name){
      ingredientData.push({
        name, eng:(document.getElementById("igEng").value||"").trim(), func:(document.getElementById("igFunc").value||"").trim(),
        vegan:document.getElementById("igVegan").checked, cpnp:document.getElementById("igCpnp").checked,
        mocra:document.getElementById("igMocra").checked, halal:document.getElementById("igHalal").checked,
        note:(document.getElementById("igNote").value||"").trim()||"직접 추가"
      });
      saveIng();buildIngredient();
    }
    return;
  }
  // 주간 업무보고 삭제
  const wkDel=e.target.closest("[data-wkdel]");
  if(wkDel){const [which,i]=wkDel.dataset.wkdel.split(":");weeklyData[which].splice(+i,1);saveWeekly();buildWeekly();return;}
  // 주간 업무보고 편집
  const wkEd=e.target.closest("[data-wkedit]");
  if(wkEd){const [which,i]=wkEd.dataset.wkedit.split(":");const it=weeklyData[which][+i];openItemEdit({type:"weekly",which,i:+i},it.t,it.m,"주간 업무 수정");return;}
  // 항목 편집 모달 저장/닫기
  if(e.target.id==="itemEditSave"){saveItemEdit();return;}
  if(e.target.closest("#itemEditClose")||e.target.id==="itemEditModal"){closeItemEdit();return;}
  // 주간 업무보고 추가
  const wkAdd=e.target.closest("[data-wkadd]");
  if(wkAdd){const which=wkAdd.dataset.wkadd;
    const tI=document.querySelector(`[data-wkadd-t="${which}"]`), mI=document.querySelector(`[data-wkadd-m="${which}"]`);
    const t=(tI.value||"").trim(), m=(mI.value||"").trim();
    if(t){const item={t,m:m||"직접 추가"};if(which==="nextWeek")item.flag="예정";weeklyData[which].push(item);saveWeekly();buildWeekly();}
    return;
  }
  // 원가 값 편집
  const costcell=e.target.closest(".editable[data-costedit]");
  if(costcell&&!costcell.querySelector("input")){
    const i=+costcell.dataset.costedit, f=costcell.dataset.costf;
    const cur=costData[i][f]||"";
    costcell.innerHTML=`<input class="celledit" value="${cur}" placeholder="값">`;
    const inp=costcell.querySelector("input");inp.focus();inp.select();
    const commit=()=>{costData[i][f]=inp.value.trim();saveCost();buildCost();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")commit();if(ev.key==="Escape")buildCost();};
    inp.onblur=commit;
    return;
  }
  // 임상 삭제
  const clinDel=e.target.closest("[data-clindel]");
  if(clinDel){const i=+clinDel.dataset.clindel;if(confirm(`"${clinicalStudies[i].title}" 임상을 삭제할까요?`)){clinicalStudies.splice(i,1);saveClin();buildClinical();}return;}
  // 임상 추가
  if(e.target.id==="clAdd"){
    const prods=(document.getElementById("clAddProd").value||"").split(",").map(s=>s.trim()).filter(Boolean);
    const item=(document.getElementById("clAddItem").value||"").trim();
    const lab=(document.getElementById("clAddLab").value||"").trim();
    const start=(document.getElementById("clAddStart").value||"").trim();
    if(prods.length&&item){
      const n=clinicalStudies.length+1;
      clinicalStudies.push({id:"CL-"+String(n).padStart(2,"0"),title:item+(prods.length>1?` (${prods.length}종 공동)`:""),item,lab:lab||"-",status:["wait","대기"],start:start||"-",kor:"-",eng:"-",doc:item+" 임상계획서.docx",products:prods,result:""});
      saveClin();buildClinical();
    }
    return;
  }
  // 임상 상태 편집
  const clinst=e.target.closest(".stedit[data-clinedit]");
  if(clinst&&!clinst.querySelector("select")){
    const i=+clinst.dataset.clinedit;const cur=clinicalStudies[i].status[0];
    clinst.innerHTML=`<select class="celledit" style="width:96px">${CLIN_STATUS.map(([v,l])=>`<option value="${v}" ${v===cur?'selected':''}>${l}</option>`).join("")}</select>`;
    const sel=clinst.querySelector("select");sel.focus();
    const commit=()=>{const v=sel.value;const label=(CLIN_STATUS.find(s=>s[0]===v)||[v,v])[1];clinicalStudies[i].status=[v,label];saveClin();buildClinical();};
    sel.onchange=commit;sel.onblur=commit;
    return;
  }
  // 임상 발행일 편집
  const clinfld=e.target.closest(".editable[data-clinfld]");
  if(clinfld&&!clinfld.querySelector("input")){
    const i=+clinfld.dataset.clinfld, f=clinfld.dataset.cf;
    const cur=clinicalStudies[i][f]||"";
    clinfld.innerHTML=`<input class="celledit" value="${cur}" placeholder="예: 2026.04.14">`;
    const inp=clinfld.querySelector("input");inp.focus();inp.select();
    const commit=()=>{clinicalStudies[i][f]=inp.value.trim();saveClin();buildClinical();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")commit();if(ev.key==="Escape")buildClinical();};
    inp.onblur=commit;
    return;
  }
  // 인증 값 편집 (인증번호/등록일/만료일)
  const cedit=e.target.closest(".editable[data-cedit]");
  if(cedit&&!cedit.querySelector("input")){
    const ci=+cedit.dataset.cedit, grp=cedit.dataset.cgrp, fld=cedit.dataset.cfld;
    const cur=(certData[ci][grp]&&certData[ci][grp][fld])||"";
    cedit.innerHTML=`<input class="celledit" value="${cur}" placeholder="입력">`;
    const inp=cedit.querySelector("input");inp.focus();inp.select();
    const commit=()=>{ if(!certData[ci][grp])certData[ci][grp]={}; certData[ci][grp][fld]=inp.value.trim(); saveCert(); buildCert(); };
    inp.onkeydown=ev=>{ if(ev.key==="Enter")commit(); if(ev.key==="Escape")buildCert(); };
    inp.onblur=commit;
    return;
  }
  // 상표 일반 칸 편집
  const tmfield=e.target.closest(".editable[data-tmfield]");
  if(tmfield&&!tmfield.querySelector("input")){
    const i=+tmfield.dataset.tmfield, f=tmfield.dataset.tmf;
    const cur=tmData[i][f]||"";
    tmfield.innerHTML=`<input class="celledit" style="width:100%" value="${(cur+'').replace(/"/g,'&quot;')}" placeholder="입력">`;
    const inp=tmfield.querySelector("input");inp.focus();inp.select();
    const c=()=>{tmData[i][f]=inp.value.trim();saveTm();buildTM();};
    inp.onkeydown=ev=>{if(ev.key==="Enter")c();if(ev.key==="Escape")buildTM();};inp.onblur=c;return;
  }
  // 상표 상태 편집
  const tmcell=e.target.closest(".stedit[data-tmedit]");
  if(tmcell&&!tmcell.querySelector("select")){
    const i=+tmcell.dataset.tmedit;const cur=tmData[i].status[0];
    tmcell.innerHTML=`<select class="celledit" style="width:110px">${TM_STATUS.map(([v,l])=>`<option value="${v}" ${v===cur?'selected':''}>${l}</option>`).join("")}</select>`;
    const sel=tmcell.querySelector("select");sel.focus();
    const commit=()=>{const v=sel.value;const label=(TM_STATUS.find(s=>s[0]===v)||[v,v])[1];tmData[i].status=[v,label];saveTm();buildTM();};
    sel.onchange=commit;sel.onblur=commit;
    return;
  }
  // 발주 부자재 편집 (CT / 발주일 / 입고일)
  const matcell=e.target.closest("[data-matedit]");
  if(matcell&&!matcell.querySelector("input")&&!matcell.querySelector("select")){
    const oi=+matcell.dataset.matedit, k=matcell.dataset.matk, f=matcell.dataset.matf;
    if(!orderData[oi][k]||orderData[oi][k].na)return;
    if(f==="ct"){
      const cur=orderData[oi][k].ct||"";
      matcell.innerHTML=`<select class="celledit" style="width:96px"><option value="">—</option><option ${cur==="샘플요청"?"selected":""}>샘플요청</option><option ${cur==="진행중"?"selected":""}>진행중</option><option ${cur==="완료"?"selected":""}>완료</option></select>`;
      const sel=matcell.querySelector("select");sel.focus();
      const c=()=>{orderData[oi][k].ct=sel.value;saveOrder();buildOrder();};
      sel.onchange=c;sel.onblur=c;return;
    }else{
      const cur=orderData[oi][k][f]||"";
      matcell.innerHTML=`<input class="celledit" value="${(cur+'').replace(/"/g,'&quot;')}" placeholder="예: 3/16">`;
      const inp=matcell.querySelector("input");inp.focus();inp.select();
      const c=()=>{orderData[oi][k][f]=inp.value.trim();saveOrder();buildOrder();};
      inp.onkeydown=ev=>{if(ev.key==="Enter")c();if(ev.key==="Escape")buildOrder();};inp.onblur=c;return;
    }
  }
  // 발주 완제품/기타 칸 편집
  const edcell=e.target.closest(".editable[data-oedit]");
  if(edcell&&!edcell.querySelector("input")){
    const oi=+edcell.dataset.oedit, field=edcell.dataset.ofield;
    const cur=orderData[oi][field]||"";
    edcell.innerHTML=`<input class="celledit" value="${(cur+'').replace(/"/g,'&quot;')}" placeholder="입력">`;
    const inp=edcell.querySelector("input"); inp.focus(); inp.select();
    const commit=()=>{
      orderData[oi][field]=inp.value.trim();
      saveOrder(); buildOrder();
    };
    inp.onkeydown=ev=>{ if(ev.key==="Enter")commit(); if(ev.key==="Escape")buildOrder(); };
    inp.onblur=commit;
    return;
  }
  // 확인사항 삭제
  const ckDel=e.target.closest("[data-check-del]");
  if(ckDel){const i=+ckDel.dataset.checkDel;checks.splice(i,1);saveChecks();buildDash();return;}
  // 확인사항 추가
  if(e.target.id==="ckAdd"){
    const title=(document.getElementById("ckTitle").value||"").trim();
    const tab=document.getElementById("ckTab").value;
    const meta=(document.getElementById("ckMeta").value||"").trim()||"직접 추가";
    if(title){const m=TAB_META[tab]||TAB_META.none;
      checks.push({p:m.p,title,meta,tag:m.tag,tc:m.tc,goto:tab==="none"?"dash":tab});
      saveChecks();buildDash();
      const h=document.getElementById("ckHint");if(h){h.textContent="✓ 저장되었습니다.";h.classList.add("ok");}
    }
    return;
  }
  const nav=e.target.closest("[data-goto]");
  if(nav){switchTab(nav.dataset.goto);return;}
  const view=e.target.closest("[data-view]");
  if(view){const wrap=view.closest("[data-toggle]");const id=wrap.dataset.toggle;
    wrap.querySelectorAll("button").forEach(x=>x.classList.remove("on"));view.classList.add("on");
    document.getElementById(id+"-card").classList.toggle("hide",view.dataset.view!=="card");
    document.getElementById(id+"-table").classList.toggle("hide",view.dataset.view!=="table");return;}
  const tr=e.target.closest(".track.expandable");
  if(tr){tr.classList.toggle("open");return;}
  const day=e.target.closest(".cal-cell[data-day]");
  if(day){selectedDate=parseInt(day.dataset.day);renderCalendar();renderSchedule();return;}
  // 이전/다음 달
  if(e.target.id==="calPrev"){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} selectedDate=1; renderCalendar(); renderSchedule(); return; }
  if(e.target.id==="calNext"){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} selectedDate=1; renderCalendar(); renderSchedule(); return; }
  // 일정 추가
  if(e.target.id==="schAdd"){
    const t=(document.getElementById("schAddT").value||"").trim();
    const m=(document.getElementById("schAddM").value||"").trim();
    if(t){
      const key=sKey(calYear,calMonth,selectedDate);
      if(!scheduleByDate[key]) scheduleByDate[key]=[];
      scheduleByDate[key].push({p:"blue",t,m});
      saveSched(); renderCalendar(); renderSchedule();
    }
    return;
  }
  // 일정 삭제
  const schDel=e.target.closest("[data-schdel]");
  if(schDel){
    const key=sKey(calYear,calMonth,selectedDate);
    const i=+schDel.dataset.schdel;
    if(scheduleByDate[key]){ scheduleByDate[key].splice(i,1); if(!scheduleByDate[key].length) delete scheduleByDate[key]; saveSched(); renderCalendar(); renderSchedule(); }
    return;
  }
  const folder=e.target.closest(".folder[data-folder]");
  if(folder){selectedFolder=folder.dataset.folder;renderFolderGrid();renderFileList();return;}
  const prev=e.target.closest(".fpreview[data-file]");
  if(prev){openPreview(prev.dataset.file);return;}
  const doc=e.target.closest(".doclink[data-file]");
  if(doc){openPreview(doc.dataset.file);return;}
  const ing=e.target.closest(".doclink[data-ing]");
  if(ing){openIngredients(+ing.dataset.ing);return;}
  if(e.target.closest("#ingClose")||e.target.id==="ingModal"){closeIngredients();return;}
  if(e.target.closest("#previewClose")||e.target.id==="previewModal"){closePreview();return;}
});
</script>
</body>
</html>
